# documentation: https://github.com/ccollier86/sb-desktop
# slogan: Invite-code netplay relay for ShadowBoy clients.
# tags: rust,axum,websocket,netplay,shadowboy
# port: 8077

services:
  netplay:
    image: ghcr.io/ccollier86/sb-netplay-serv:latest
    restart: unless-stopped
    environment:
      - SERVICE_URL_NETPLAY
      - SERVICE_FQDN_NETPLAY
      - SERVICE_URL_NETPLAY_8077
      - SB_NETPLAY_BIND_ADDR=${SB_NETPLAY_BIND_ADDR}
      - SB_NETPLAY_AUTHORIZE_URL=${SB_NETPLAY_AUTHORIZE_URL}
      - SB_NETPLAY_DESKTOP_AUTHORIZE_URL=${SB_NETPLAY_DESKTOP_AUTHORIZE_URL}
      - SB_NETPLAY_LICENSE_INTERNAL_SECRET=${SB_NETPLAY_LICENSE_INTERNAL_SECRET}
      - SB_NETPLAY_ADMIN_TOKEN=${SB_NETPLAY_ADMIN_TOKEN}
      - SB_NETPLAY_LOG_FORMAT=${SB_NETPLAY_LOG_FORMAT}
      - SB_NETPLAY_TRUST_PROXY_HEADERS=${SB_NETPLAY_TRUST_PROXY_HEADERS}
      - SB_NETPLAY_RATE_CREATE_ROOM_PER_MINUTE=${SB_NETPLAY_RATE_CREATE_ROOM_PER_MINUTE}
      - SB_NETPLAY_RATE_WS_JOIN_PER_MINUTE=${SB_NETPLAY_RATE_WS_JOIN_PER_MINUTE}
      - SB_NETPLAY_RATE_ROOM_STATUS_PER_MINUTE=${SB_NETPLAY_RATE_ROOM_STATUS_PER_MINUTE}
      - SB_NETPLAY_RECONNECT_GRACE_SECONDS=${SB_NETPLAY_RECONNECT_GRACE_SECONDS}
      - SB_NETPLAY_RUNNER_HANDOFF_GRACE_SECONDS=${SB_NETPLAY_RUNNER_HANDOFF_GRACE_SECONDS}
      - SB_NETPLAY_HEARTBEAT_STALE_SECONDS=${SB_NETPLAY_HEARTBEAT_STALE_SECONDS}
      - SB_NETPLAY_HEARTBEAT_DISCONNECT_SECONDS=${SB_NETPLAY_HEARTBEAT_DISCONNECT_SECONDS}
      - SB_NETPLAY_ROOM_IDLE_SECONDS=${SB_NETPLAY_ROOM_IDLE_SECONDS}
      - SB_NETPLAY_LOBBY_IDLE_SECONDS=${SB_NETPLAY_LOBBY_IDLE_SECONDS}
      - SB_NETPLAY_POSTGRES_URL=${SB_NETPLAY_POSTGRES_URL}
      - SB_NETPLAY_POSTGRES_EVENTS_TABLE=${SB_NETPLAY_POSTGRES_EVENTS_TABLE}
      - SB_NETPLAY_POSTGRES_PERFORMANCE_TABLE=${SB_NETPLAY_POSTGRES_PERFORMANCE_TABLE}
      - SB_NETPLAY_TELEMETRY_QUEUE_CAPACITY=${SB_NETPLAY_TELEMETRY_QUEUE_CAPACITY}
      - SB_NETPLAY_TELEMETRY_BATCH_SIZE=${SB_NETPLAY_TELEMETRY_BATCH_SIZE}
      - SB_NETPLAY_TELEMETRY_FLUSH_MS=${SB_NETPLAY_TELEMETRY_FLUSH_MS}
      - SB_NETPLAY_VOICE_BROKER_URL=${SB_NETPLAY_VOICE_BROKER_URL}
      - SB_NETPLAY_VOICE_BROKER_TOKEN=${SB_NETPLAY_VOICE_BROKER_TOKEN}
      - SB_NETPLAY_VOICE_BROKER_TIMEOUT_MS=${SB_NETPLAY_VOICE_BROKER_TIMEOUT_MS}
      - RUST_LOG=${RUST_LOG}
    expose:
      - "8077"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8077/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

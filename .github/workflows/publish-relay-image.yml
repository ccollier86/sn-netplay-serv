name: Publish relay image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            SB_NETPLAY_BUILD_SHA=${{ github.sha }}
            SB_NETPLAY_IMAGE_IDENTITY=ghcr.io/ccollier86/sb-netplay-serv:${{ github.sha }}
          tags: |
            ghcr.io/ccollier86/sb-netplay-serv:${{ github.sha }}
            ghcr.io/ccollier86/sb-netplay-serv:latest
